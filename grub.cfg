# =============================================================================
# grub.cfg — Configuración de GRUB para Kolotibablo OS
#
# Este archivo debe colocarse en: iso/boot/grub/grub.cfg
# durante el proceso de generación de la ISO (make iso lo hace automáticamente).
#
# GRUB2 lo leerá al arrancar y mostrará el menú de selección de SO.
# =============================================================================

# Tiempo de espera antes de arrancar la entrada por defecto (en segundos)
# 0 = arrancar inmediatamente sin mostrar menú
# -1 = esperar indefinidamente hasta que el usuario seleccione
set timeout=5

# Entrada de menú por defecto (índice 0 = primera entrada)
set default=0

# =============================================================================
# Entrada de menú principal: Kolotibablo OS
# =============================================================================
menuentry "Kolotibablo OS v0.1 -- Bare Bones" {
    # multiboot: indica a GRUB que cargue el archivo ELF como kernel Multiboot v1
    # La ruta /boot/kernel.elf es relativa al sistema de archivos de la ISO
    multiboot /boot/kernel.elf

    # boot: transfiere el control al kernel cargado
    # GRUB pone EAX = 0x2BADB002 y EBX = puntero a multiboot_info_t antes de saltar
    boot
}
